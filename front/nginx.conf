server {
    # Listen on 3000 inside the container.
    # Docker maps host port 4321 → container port 3000 (ports: '4321:3000' in docker-compose.yml),
    # so the app is reachable at http://localhost:4321 on the host — matching the Astro dev server
    # port used in Mode A (npm run dev), giving both modes the same URL.
    #
    # absolute_redirect off keeps Location headers relative (e.g. /host/ instead of
    # http://localhost:3000/host/) so the browser correctly resolves the redirect against
    # the *host* port 4321 rather than the internal container port 3000.
    absolute_redirect off;

    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS resolver.
    resolver 127.0.0.11 valid=10s;

    # Proxy WebSocket + HTTP PartyKit traffic to the backend container.
    # Front only starts after back passes its healthcheck (service_healthy),
    # so `back` is guaranteed to be resolvable at nginx startup.
    location /parties/ {
        proxy_pass http://back:1999/parties/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback: serve index.html for all unknown routes (/host, /play, …)
    # Use $uri/index.html instead of $uri/ to avoid nginx's trailing-slash 301
    # redirect, which gets misrouted to port 80 by Rancher Desktop / Docker's
    # port mapping layer.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
